<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排放源管理 - 溫室氣體盤查系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .header .badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-top: 15px;
        }

        .content {
            padding: 30px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
        }

        .step:not(:last-child):before {
            content: '';
            position: absolute;
            top: 20px;
            right: -50%;
            width: 100%;
            height: 2px;
            background: #e2e8f0;
            z-index: 1;
        }

        .step.completed .step-number {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        .step.active .step-number {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 8px;
            z-index: 2;
        }

        .step-label {
            font-size: 14px;
            color: #64748b;
        }

        .step.active .step-label {
            color: #4f46e5;
            font-weight: 500;
        }

        /* 範疇選擇器 */
        .scope-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .scope-card {
            flex: 1;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .scope-card:hover {
            border-color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2);
        }

        .scope-card.active {
            background: #eef2ff;
            border-color: #4f46e5;
        }

        .scope-icon {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .scope-card h3 {
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 20px;
        }

        .scope-card p {
            color: #64748b;
            font-size: 14px;
        }

        .scope-card.active h3 {
            color: #4f46e5;
        }

        /* 邊界選擇器 */
        .org-selector {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .org-selector select {
            background: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            color: #1e293b;
            font-size: 14px;
            min-width: 200px;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin: 20px 0;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-primary:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #4f46e5;
            border: 2px solid #4f46e5;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: #eef2ff;
        }

        .btn-icon {
            background: none;
            border: none;
            padding: 5px 8px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }

        .btn-icon:hover {
            background: #f1f5f9;
        }

        .emission-table {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin: 20px 0 30px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 80px 2fr 1.5fr 2fr 80px 100px;
            background: #f8fafc;
            padding: 12px;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        .table-row {
            display: grid;
            grid-template-columns: 80px 2fr 1.5fr 2fr 80px 100px;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            align-items: center;
        }

        .table-row:hover {
            background: #f8fafc;
        }

        .col-number {
            font-weight: 600;
            color: #4f46e5;
        }

        .scope-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
        }

        .scope1-badge {
            background: #fee2e2;
            color: #ef4444;
        }

        .scope2-badge {
            background: #dbeafe;
            color: #3b82f6;
        }

        /* 按鈕群組 */
        .button-group {
            display: flex !important;
            gap: 20px !important;
            justify-content: center !important;
            align-items: center !important;
            margin: 30px auto 0 auto !important;
            padding: 0 !important;
            width: 100% !important;
            clear: both !important;
            position: relative !important;
            left: 0 !important;
            right: 0 !important;
            text-align: center !important;
        }

        .button-group .btn-secondary,
        .button-group .btn-primary {
            display: inline-flex !important;
            min-width: 160px !important;
            padding: 12px 24px !important;
            text-align: center !important;
            justify-content: center !important;
            align-items: center !important;
            font-size: 16px !important;
            margin: 0 !important;
            float: none !important;
        }

        .content {
            text-align: center !important;
        }

        .button-group::before,
        .button-group::after {
            display: none !important;
            content: none !important;
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column !important;
                gap: 10px !important;
            }
            
            .button-group .btn-secondary,
            .button-group .btn-primary {
                width: 100% !important;
                max-width: 300px !important;
                margin: 0 auto !important;
            }
        }

        /* 模態框樣式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 700px;
            max-width: 90%;
            padding: 30px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .modal-header h3 {
            color: #1e293b;
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #64748b;
        }

        .close-btn:hover {
            color: #1e293b;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group label .required {
            color: #ef4444;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-group input.error,
        .form-group select.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .alert.success {
            background: #10b981;
        }

        .alert.error {
            background: #ef4444;
        }

        .alert.warning {
            background: #f59e0b;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>排放源管理</h1>
            <p>建立並管理各類排放源</p>
            <span class="badge">盤查年度：<span id="currentYear"></span></span>
        </div>

        <div class="content">
            <!-- 邊界選擇器 -->
            <div class="org-selector">
                <span>🏢 目前組織：</span>
                <select id="boundarySelect" onchange="onBoundaryChange()">
                    <option value="">請選擇邊界</option>
                </select>
            </div>

            <!-- 範疇選擇器 -->
            <div class="scope-selector">
                <div class="scope-card active" onclick="selectScope('scope1')" id="scope1Card">
                    <div class="scope-icon">🏭</div>
                    <h3>範疇一</h3>
                    <p>直接排放源（固定燃燒、移動燃燒、逸散、製程）</p>
                </div>
                <div class="scope-card" onclick="selectScope('scope2')" id="scope2Card">
                    <div class="scope-icon">⚡</div>
                    <h3>範疇二</h3>
                    <p>間接排放源（外購電力、外購蒸氣）</p>
                </div>
            </div>

            <!-- 操作列 - 移除搜尋框，只保留新增按鈕 -->
            <div class="action-bar">
                <button class="btn-primary" onclick="openAddModal()">
                    <span>+</span> 新增排放源
                </button>
            </div>

            <!-- 排放源表格 -->
            <div class="emission-table">
                <div class="table-header">
                    <div>編號</div>
                    <div>排放源名稱</div>
                    <div>排放類型</div>
                    <div>原(燃)物料</div>
                    <div>數量</div>
                    <div>操作</div>
                </div>
                <div id="emissionList">
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>請先選擇組織邊界</p>
                    </div>
                </div>
            </div>

            <!-- 按鈕群組 -->
            <div class="button-group">
                <button class="btn-secondary" onclick="goBack()">回上頁</button>
                <button class="btn-primary" onclick="goToActivity()">下一步 : 活動數據</button>
            </div>
        </div>
    </div>

    <!-- 新增/編輯排放源模態框 -->
    <div class="modal" id="emissionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新增排放源</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <!-- 隱藏欄位：儲存當前範疇 -->
            <input type="hidden" id="currentScope" value="scope1">
            <input type="hidden" id="editingSourceId" value="">

            <div class="form-row">
                <div class="form-group">
                    <label>編號 <span class="required">*</span></label>
                    <input type="text" id="sourceNumber" placeholder="例如：E001" autocomplete="off">
                    <div class="error-message" id="errorNumber"></div>
                </div>

                <div class="form-group">
                    <label>排放源名稱 <span class="required">*</span></label>
                    <input type="text" id="sourceName" placeholder="例如：緊急柴油發電機" autocomplete="off">
                    <div class="error-message" id="errorName"></div>
                </div>

                <div class="form-group">
                    <label>數量 <span class="required">*</span></label>
                    <input type="number" id="equipmentQuantity" min="1" value="1">
                    <div class="error-message" id="errorQuantity"></div>
                </div>
            </div>

            <!-- 排放類型 -->
            <div class="form-group">
                <label>排放類型 <span class="required">*</span></label>
                <select id="emissionType" onchange="updateMaterialOptions()">
                    <!-- 根據當前範疇動態載入 -->
                </select>
                <div class="error-message" id="errorType"></div>
            </div>

            <div class="form-group">
                <label>原(燃)物料 <span class="required">*</span></label>
                <select id="material">
                    <!-- 動態載入 -->
                </select>
                <div class="error-message" id="errorMaterial"></div>
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveEmissionSource()" id="saveBtn">儲存</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 全域變數 ==========
        const currentYear = window.location.pathname.split('/').pop();
        document.getElementById('currentYear').textContent = currentYear;

        let currentScope = 'scope1';  // 當前選擇的範疇
        let currentBoundaryId = null;
        let currentEditId = null;
        let emissionSources = [];

        // 移除原本的 combustionMaterials 陣列，改為在函數中定義

        // 英文轉中文對照表
        const scopeMap = {
            'scope1': '範疇一',
            'scope2': '範疇二'
        };

        const typeMap = {
            'fixed': '固定燃燒',
            'mobile': '移動燃燒',
            'fugitive': '逸散排放',
            'process': '製程排放',
            'electricity': '外購電力',
            'steam': '外購蒸氣'
        };

        // ========== 選擇範疇 ==========
        function selectScope(scope) {
            currentScope = scope;
            
            // 更新UI
            document.getElementById('scope1Card').classList.remove('active');
            document.getElementById('scope2Card').classList.remove('active');
            document.getElementById(scope + 'Card').classList.add('active');
            
            // 重新渲染列表
            if (currentBoundaryId) {
                renderEmissionList(emissionSources);
            }
        }

        // ========== 更新範疇UI ==========
        function updateScopeUI() {
            document.getElementById('scope1Card').classList.remove('active');
            document.getElementById('scope2Card').classList.remove('active');
            document.getElementById(currentScope + 'Card').classList.add('active');
        }

        // ========== 回上頁 ==========
        function goBack() {
            window.location.href = `/inventory_list/boundary/${currentYear}`;
        }

        function goToActivity() {
            window.location.href = `/inventory_list/activity/${currentYear}`;
        }

        // ========== 顯示提示訊息 ==========
        function showAlert(message, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 3000);
        }

        // ========== 載入邊界下拉選單 ==========
        async function loadBoundaries() {
            try {
                const response = await fetch(`/inventory_list/emission/${currentYear}/boundaries`);
                const result = await response.json();
                
                if (result.success) {
                    const select = document.getElementById('boundarySelect');
                    select.innerHTML = '<option value="">請選擇邊界</option>';
                    
                    result.data.forEach(b => {
                        const option = document.createElement('option');
                        option.value = b.boundary_id;
                        option.textContent = b.boundary_name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('載入邊界失敗:', error);
                showAlert('載入邊界失敗', 'error');
            }
        }

        // ========== 邊界變更時載入排放源 ==========
        async function onBoundaryChange() {
            const select = document.getElementById('boundarySelect');
            currentBoundaryId = select.value;
            
            if (currentBoundaryId) {
                await loadEmissionSources(currentBoundaryId);
            } else {
                document.getElementById('emissionList').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>請先選擇組織邊界</p>
                    </div>
                `;
            }
        }

        // ========== 載入排放源 ==========
        async function loadEmissionSources(boundaryId) {
            try {
                const response = await fetch(`/inventory_list/emission/${currentYear}/list?boundary_id=${boundaryId}`);
                const result = await response.json();
                
                if (result.success) {
                    emissionSources = result.data;
                    renderEmissionList(emissionSources);
                }
            } catch (error) {
                console.error('載入排放源失敗:', error);
                showAlert('載入排放源失敗', 'error');
            }
        }

        // ========== 渲染排放源列表 ==========
        function renderEmissionList(sources) {
            const listElement = document.getElementById('emissionList');
            
            // 根據選擇的範疇過濾
            const scopeChinese = scopeMap[currentScope] || currentScope;
            const filteredSources = sources.filter(s => s.scope === scopeChinese);
            
            if (filteredSources.length === 0) {
                listElement.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p style="margin-bottom: 30px;">目前沒有${currentScope === 'scope1' ? '範疇一' : '範疇二'}的排放源資料</p>
                        <button class="btn-primary" onclick="openAddModal()">+ 新增排放源</button>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredSources.forEach(source => {
                html += `
                    <div class="table-row" data-id="${source.source_id}">
                        <div class="col-number">${escapeHtml(source.source_number)}</div>
                        <div>
                            <span class="scope-badge ${source.scope === '範疇一' ? 'scope1-badge' : 'scope2-badge'}">
                                ${source.scope}
                            </span>
                            ${escapeHtml(source.source_name)}
                        </div>
                        <div>${escapeHtml(source.emission_type)}</div>
                        <div>${escapeHtml(source.material)}</div>
                        <div>${source.quantity}</div>
                        <div>
                            <button class="btn-icon" onclick="editEmissionSource(${source.source_id})" title="編輯">✎</button>
                            <button class="btn-icon" onclick="deleteEmissionSource(${source.source_id})" title="刪除">🗑️</button>
                        </div>
                    </div>
                `;
            });
            
            listElement.innerHTML = html;
        }

        // ========== 開啟新增模態框 ==========
        function openAddModal() {
            if (!currentBoundaryId) {
                showAlert('請先選擇組織邊界', 'warning');
                return;
            }

            currentEditId = null;
            document.getElementById('modalTitle').textContent = '新增排放源';
            document.getElementById('sourceNumber').value = '';
            document.getElementById('sourceName').value = '';
            document.getElementById('equipmentQuantity').value = '1';
            document.getElementById('editingSourceId').value = '';
            
            // 設定當前範疇到隱藏欄位
            document.getElementById('currentScope').value = currentScope;
            
            // 清除所有錯誤訊息
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('.form-group input, .form-group select').forEach(el => {
                el.classList.remove('error');
            });
            
            // 根據當前範疇更新排放類型選項
            updateEmissionTypeOptionsForScope(currentScope);
            
            document.getElementById('emissionModal').classList.add('active');
        }

        // ========== 根據範疇更新排放類型選項 ==========
        function updateEmissionTypeOptionsForScope(scope) {
            const typeSelect = document.getElementById('emissionType');
            
            let options = '<option value="">請選擇排放類型</option>';
            
            if (scope === 'scope1') {
                options += `
                    <option value="fixed">固定燃燒</option>
                    <option value="mobile">移動燃燒</option>
                    <option value="fugitive">逸散排放</option>
                    <option value="process">製程排放</option>
                `;
            } else {
                options += `
                    <option value="electricity">外購電力</option>
                    <option value="steam">外購蒸氣</option>
                `;
            }
            
            typeSelect.innerHTML = options;
            
            // 清空並更新物料選項
            updateMaterialOptionsForScope(scope, '');
        }

        // ========== 根據範疇和類型更新物料選項 ==========
        function updateMaterialOptionsForScope(scope, selectedType) {
            const materialSelect = document.getElementById('material');
            
            let options = '<option value="">請選擇原(燃)物料</option>';
            
            if (scope === 'scope1') {
                switch(selectedType) {
                    case 'fixed':  // 固定燃燒 - 54項
                        const fixedMaterials = [
                            '原油', '奧里油', '液化天然氣', '汽油', '車用汽油', '航空汽油',
                            '航空燃油汽油型', '航空燃油煤油型', '其他煤油', '頁岩油', '柴油',
                            '燃料油', '液化石油氣', '乙烷', '石油腦', '瀝青', '潤滑油', '石油焦',
                            '煉油廠進料', '煉油氣', '石蠟', '白精油', '其他石油產品', '無煙煤',
                            '煉焦煤', '其他煙煤', '亞煙煤', '褐煤', '油頁岩/焦油砂', '褐煤塊',
                            '煤球', '焦炭', '煤氣焦碳', '煤焦油', '煤氣廠氣體', '焦爐氣', '高爐氣',
                            '轉爐氣', '天然氣', '都市廢棄物 - 非生質部分', '事業廢棄物', '廢油',
                            '泥煤', '木材/廢材', '亞硫酸鹽廢液 / 黑液', '其他初級固體生質', '木炭',
                            '生質汽油', '生質柴油', '其他液體生質燃料', '掩埋沼氣', '污泥沼氣',
                            '其他氣體生質燃料', '都市廢棄物 - 生質部分'
                        ];
                        fixedMaterials.forEach(material => {
                            options += `<option value="${material}">${material}</option>`;
                        });
                        break;
                        
                    case 'mobile':  // 移動燃燒 - 11項
                        const mobileMaterials = [
                            '車用汽油-未控制', '車用汽油-氧化觸媒', '車用汽油-1995年後之低里程輕型車輛',
                            '柴油', '煤油', '液化石油氣', '潤滑油', '壓縮天然氣', '液化天然氣',
                            '乙醇（卡車）', '乙醇（汽車）'
                        ];
                        mobileMaterials.forEach(material => {
                            options += `<option value="${material}">${material}</option>`;
                        });
                        break;
                        
                    case 'fugitive':
                        options += `
                            <option value="GWP">GWP</option>
                            <option value="氮氣">氮氣</option>
                            <option value="甲烷">甲烷</option>
                        `;
                        break;
                        
                    case 'process':
                        options += `
                            <option value="石灰石">石灰石</option>
                            <option value="碳">碳</option>
                            <option value="碳酸鹽">碳酸鹽</option>
                        `;
                        break;
                        
                    default:
                        options += `
                            <option value="柴油">柴油</option>
                            <option value="汽油">汽油</option>
                            <option value="天然氣">天然氣</option>
                            <option value="GWP">GWP</option>
                        `;
                }
            } else {
                // 範疇二的物料選項保持不變
                switch(selectedType) {
                    case 'electricity':
                        options += `<option value="電力">電力</option>`;
                        break;
                    case 'steam':
                        options += `<option value="蒸氣">蒸氣</option>`;
                        break;
                    default:
                        options += `
                            <option value="電力">電力</option>
                            <option value="蒸氣">蒸氣</option>
                        `;
                }
            }
            
            materialSelect.innerHTML = options;
        }

        // ========== 排放類型變更時更新物料選項 ==========
        function updateMaterialOptions() {
            const scope = document.getElementById('currentScope').value;
            const selectedType = document.getElementById('emissionType').value;
            updateMaterialOptionsForScope(scope, selectedType);
        }

        // ========== 關閉模態框 ==========
        function closeModal() {
            document.getElementById('emissionModal').classList.remove('active');
        }

        // ========== 驗證表單 ==========
        function validateForm() {
            let isValid = true;
            
            // 清除所有錯誤訊息
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('.form-group input, .form-group select').forEach(el => {
                el.classList.remove('error');
            });

            // 驗證編號
            const number = document.getElementById('sourceNumber').value.trim();
            if (!number) {
                document.getElementById('errorNumber').textContent = '請輸入編號';
                document.getElementById('errorNumber').classList.add('show');
                document.getElementById('sourceNumber').classList.add('error');
                isValid = false;
            }

            // 驗證名稱
            const name = document.getElementById('sourceName').value.trim();
            if (!name) {
                document.getElementById('errorName').textContent = '請輸入排放源名稱';
                document.getElementById('errorName').classList.add('show');
                document.getElementById('sourceName').classList.add('error');
                isValid = false;
            }

            // 驗證數量
            const quantity = document.getElementById('equipmentQuantity').value;
            if (!quantity || quantity < 1) {
                document.getElementById('errorQuantity').textContent = '請輸入有效的數量（至少1）';
                document.getElementById('errorQuantity').classList.add('show');
                document.getElementById('equipmentQuantity').classList.add('error');
                isValid = false;
            }

            // 驗證排放類型
            const type = document.getElementById('emissionType').value;
            if (!type) {
                document.getElementById('errorType').textContent = '請選擇排放類型';
                document.getElementById('errorType').classList.add('show');
                document.getElementById('emissionType').classList.add('error');
                isValid = false;
            }

            // 驗證物料
            const material = document.getElementById('material').value;
            if (!material) {
                document.getElementById('errorMaterial').textContent = '請選擇原(燃)物料';
                document.getElementById('errorMaterial').classList.add('show');
                document.getElementById('material').classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        // ========== 儲存排放源 ==========
        async function saveEmissionSource() {
            if (!validateForm()) {
                return;
            }

            const number = document.getElementById('sourceNumber').value.trim();
            const name = document.getElementById('sourceName').value.trim();
            const quantity = parseInt(document.getElementById('equipmentQuantity').value);
            const type = document.getElementById('emissionType').value;
            const material = document.getElementById('material').value;
            // 從隱藏欄位取得當前範疇
            const scope = document.getElementById('currentScope').value;

            // 將英文轉換為中文
            const scopeChinese = scopeMap[scope] || scope;
            const typeChinese = typeMap[type] || type;

            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.textContent;
            saveBtn.innerHTML = '<span class="loading"></span> 儲存中...';
            saveBtn.disabled = true;

            try {
                const url = currentEditId 
                    ? `/inventory_list/emission/${currentYear}/edit/${currentEditId}`
                    : `/inventory_list/emission/${currentYear}/add`;

                const method = currentEditId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source_number: number,
                        source_name: name,
                        scope: scopeChinese,  // 使用當前範疇
                        emission_type: typeChinese,
                        material: material,
                        quantity: quantity,
                        boundary_id: parseInt(currentBoundaryId)
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert(currentEditId ? '更新成功' : '新增成功');
                    closeModal();
                    await loadEmissionSources(currentBoundaryId);
                } else {
                    showAlert(result.message || '操作失敗', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('系統錯誤，請稍後再試', 'error');
            } finally {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }
        }

        // ========== 編輯排放源 ==========
        async function editEmissionSource(id) {
            const source = emissionSources.find(s => s.source_id === id);
            if (!source) return;

            currentEditId = id;
            document.getElementById('modalTitle').textContent = '編輯排放源';
            document.getElementById('sourceNumber').value = source.source_number;
            document.getElementById('sourceName').value = source.source_name;
            document.getElementById('equipmentQuantity').value = source.quantity;
            
            // 將中文轉回英文
            const reverseScopeMap = {
                '範疇一': 'scope1',
                '範疇二': 'scope2'
            };
            
            const reverseTypeMap = {
                '固定燃燒': 'fixed',
                '移動燃燒': 'mobile',
                '逸散排放': 'fugitive',
                '製程排放': 'process',
                '外購電力': 'electricity',
                '外購蒸氣': 'steam'
            };
            
            const scopeEnglish = reverseScopeMap[source.scope] || 'scope1';
            const typeEnglish = reverseTypeMap[source.emission_type] || source.emission_type;
            
            // 設定當前範疇到隱藏欄位
            document.getElementById('currentScope').value = scopeEnglish;
            
            // 清除錯誤訊息
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('.form-group input, .form-group select').forEach(el => {
                el.classList.remove('error');
            });
            
            // 根據排放源的範疇更新選項
            updateEmissionTypeOptionsForScope(scopeEnglish);
            
            // 設定選中的值
            setTimeout(() => {
                document.getElementById('emissionType').value = typeEnglish;
                updateMaterialOptionsForScope(scopeEnglish, typeEnglish);
                setTimeout(() => {
                    document.getElementById('material').value = source.material;
                }, 50);
            }, 50);

            document.getElementById('emissionModal').classList.add('active');
        }

        // ========== 刪除排放源 ==========
        async function deleteEmissionSource(id) {
            if (!confirm('確定要刪除此排放源嗎？')) return;

            try {
                const response = await fetch(`/inventory_list/emission/${currentYear}/delete/${id}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('刪除成功');
                    await loadEmissionSources(currentBoundaryId);
                } else {
                    showAlert(result.message || '刪除失敗', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('系統錯誤，請稍後再試', 'error');
            }
        }

        // ========== 下一步 ==========
        // ========== HTML跳脫 ==========
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            await loadBoundaries();
            updateScopeUI();
        });

        // 點擊模態框背景關閉
        document.getElementById('emissionModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 鍵盤ESC關閉
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
