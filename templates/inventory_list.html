{% extends "base.html" %}

{% block title %}盤查年度列表{% endblock %}

{% block head %}
<style>
/* 僅作用於盤查年度列表容器 */
#inventory-list table {
    width: 80%;
    max-width: 700px;
    margin: 20px auto;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

#inventory-list thead {
    background-color: #3498db;
    color: white;
}

#inventory-list thead th {
    padding: 10px;
    font-weight: 600;
    text-align: center;
}

#inventory-list tbody td {
    padding: 8px 12px;
    text-align: center;
    font-size: 0.95rem;
}

#inventory-list tbody tr:nth-child(even) {
    background-color: #f9f9f9;
}

#inventory-list tbody tr:hover {
    background-color: #ecf6fc;
}

/* 按鈕樣式限定在盤查年度列表 */
#inventory-list .action-button {
    padding: 6px 12px;
    font-size: 0.95rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: all 0.3s ease;
}

#inventory-list .action-button:hover {
    transform: translateY(-1px);
}

#create-button {
    background-color: #59ce7a;
    color: white;
}

#create-button:hover {
    background-color: #45b568;
}

#inventory-list .view-btn {
    background-color: #3498db;
    color: white;
}

#inventory-list .view-btn:hover {
    background-color: #2980b9;
}

#inventory-list .delete-btn {
    background-color: #e74c3c;
    color: white;
}

#inventory-list .delete-btn:hover {
    background-color: #c0392b;
}

/* 按鈕容器 */
#inventory-list .button-container-outside {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

/* Modal */
#inventory-list .modal-overlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100vw;
    height:100vh;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

#inventory-list .modal {
    background: #fff;
    border-radius: 8px;
    padding: 20px 30px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#inventory-list .modal input[type="number"] {
    width: 100%;
    padding: 10px;
    font-size: 1.1em;
    border: 2px solid #ddd;
    border-radius: 5px;
    margin-bottom: 20px;
    box-sizing: border-box;
    transition: border-color 0.3s;
}

#inventory-list .modal input[type="number"]:focus {
    outline: none;
    border-color: #59ce7a;
}

#inventory-list .modal-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

#inventory-list .modal-buttons button {
    padding: 8px 16px;
    font-size: 1em;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-weight: 500;
}

#inventory-list .btn-cancel {
    background-color: #e74c3c;
    color: white;
}

#inventory-list .btn-cancel:hover {
    background-color: #c0392b;
}

#inventory-list .btn-confirm {
    background-color: #59ce7a;
    color: white;
}

#inventory-list .btn-confirm:hover {
    background-color: #45b568;
}
</style>
{% endblock %}

{% block content %}
<div id="inventory-list">
    <h1 style="text-align:center;">盤查年度列表</h1>

    <div class="button-container-outside">
        <button class="action-button" id="create-button">➕ 建立盤查</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>年度</th>
                <th>
                    <!-- 小放大鏡 icon 代替「檢視」文字 -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                        <circle cx="11" cy="11" r="7"/>
                        <line x1="16.65" y1="16.65" x2="21" y2="21"/>
                    </svg>
                </th>
                <th>
                    <!-- 小垃圾桶 icon 代替「刪除」文字 -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <path d="M10 11v6"/>
                        <path d="M14 11v6"/>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                    </svg>
                </th>
            </tr>
        </thead>
        <tbody>
            {% for y in years %}
            <tr data-year="{{ y.year }}">
                <td>{{ y.year }}年度</td>
                <td>
                    <button class="action-button view-btn" data-year="{{ y.year }}" type="button">檢視</button>
                </td>
                <td>
                    <button class="action-button delete-btn" data-year="{{ y.year }}" type="button">刪除</button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" style="text-align:center;">尚無盤查年度資料</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
        <div class="modal">
            <h2>建立新的盤查年度</h2>
            <input type="number" id="yearInput" placeholder="例如 2026" min="1900" max="2100" />
            <div class="modal-buttons">
                <button class="btn-cancel" id="cancelBtn">取消</button>
                <button class="btn-confirm" id="confirmBtn">建立</button>
            </div>
        </div>
    </div>
</div>

<script>
// 事件代理綁定，保證 SPA 或頁面切換後依然有效
document.addEventListener("click", async (e) => {
    // 建立盤查按鈕
    if (e.target.closest("#create-button")) {
        const modalOverlay = document.getElementById("modalOverlay");
        const yearInput = document.getElementById("yearInput");
        modalOverlay.style.display = "flex";
        yearInput.value = "";
        yearInput.focus();
    }

    // 取消 Modal
    if (e.target.closest("#cancelBtn")) {
        document.getElementById("modalOverlay").style.display = "none";
    }

    // 確認建立
    if (e.target.closest("#confirmBtn")) {
        const yearInput = document.getElementById("yearInput");
        const year = yearInput.value.trim();
        if(!year || isNaN(year) || year < 1900 || year > 2100){
            alert("請輸入有效年份(1900~2100)");
            yearInput.focus();
            return;
        }

        try {
            const res = await fetch("/create/", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({year: Number(year)})
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.message || "建立失敗");
                return;
            }
            if (data.success) {
                document.getElementById("modalOverlay").style.display = "none";
                window.location.href = `/inventory_list/boundary/${data.year}`;
            }
        } catch(err) {
            console.error(err);
            alert("系統錯誤，請稍後再試");
        }
    }

    // 檢視
    if (e.target.closest(".view-btn")) {
        const year = e.target.closest(".view-btn").dataset.year;
        window.location.href = `/inventory_list/boundary/${year}`;
    }

    // 刪除
    if (e.target.closest(".delete-btn")) {
        const btn = e.target.closest(".delete-btn");
        const year = btn.dataset.year;
        if (!confirm(`確定要刪除 ${year} 年度的盤查資料嗎？此動作無法復原！`)) return;

        try {
            const res = await fetch(`/inventory_list/${year}/delete`, {
                method: 'DELETE',
                headers: {'Content-Type':'application/json'}
            });
            const data = await res.json();
            if (data.success) {
                alert(data.message);
                const row = btn.closest('tr');
                row.remove();
            } else {
                alert(data.message || '刪除失敗');
            }
        } catch(err) {
            console.error(err);
            alert('刪除失敗，請稍後再試');
        }
    }
});

// ESC 鍵關閉 Modal
window.addEventListener("keydown", (e) => {
    if(e.key === "Escape"){
        const modalOverlay = document.getElementById("modalOverlay");
        if(modalOverlay.style.display === "flex"){
            modalOverlay.style.display = "none";
        }
    }
});
</script>
{% endblock %}
