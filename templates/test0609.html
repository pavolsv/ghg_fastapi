<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組織架構圖生成器</title>

    <!-- Google Org Chart -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        /* ========== CSS Reset & 全域樣式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f0f4f8;
            color: #333;
            min-height: 100vh;
        }

        /* ========== 頂部標題列 ========== */
        .header {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: white;
            padding: 20px 32px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* ========== 主容器 ========== */
        .main-container {
            display: flex;
            gap: 24px;
            max-width: 1400px;
            margin: 24px auto;
            padding: 0 24px;
            height: calc(100vh - 180px);
            min-height: 600px;
        }

        /* ========== 左側輸入區 ========== */
        .input-panel {
            flex: 0 0 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #fafbfc;
            padding: 16px 20px;
            border-bottom: 1px solid #e8ecf0;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-header .icon {
            font-size: 1.3rem;
        }

        /* 表單區 */
        .form-section {
            padding: 20px;
            border-bottom: 1px solid #e8ecf0;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        .form-group label .required {
            color: #e53935;
        }
        .form-group label .optional {
            color: #999;
            font-weight: 400;
            font-size: 0.75rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #dde1e6;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafbfc;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3f51b5;
            box-shadow: 0 0 0 3px rgba(63,81,181,0.1);
            background: white;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: #3f51b5;
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            background: #303f9f;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(63,81,181,0.3);
        }
        .btn-outline {
            background: white;
            color: #3f51b5;
            border: 1.5px solid #3f51b5;
        }
        .btn-outline:hover {
            background: #f5f6ff;
        }
        .btn-danger {
            background: white;
            color: #e53935;
            border: 1.5px solid #e53935;
        }
        .btn-danger:hover {
            background: #fff5f5;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.78rem;
            border-radius: 6px;
        }

        /* 節點列表區 */
        .node-list-section {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .node-list-section h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .node-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            margin-bottom: 8px;
            background: #f8f9fb;
            border-radius: 8px;
            border: 1px solid #e8ecf0;
            transition: all 0.15s;
            gap: 10px;
        }
        .node-item:hover {
            background: #eef0f8;
            border-color: #c5cae9;
        }
        .node-item .node-info {
            flex: 1;
            min-width: 0;
        }
        .node-item .node-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a237e;
        }
        .node-item .node-detail {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .node-item .node-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        /* ========== 右側預覽區 ========== */
        .preview-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .preview-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-actions {
            display: flex;
            gap: 8px;
        }
        #org-chart-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafbfc;
        }
        #org-chart {
            min-width: 100%;
            min-height: 100%;
        }

        /* 提示訊息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #2e7d32;
        }
        .toast.error {
            background: #c62828;
        }

        /* ========== 響應式 ========== */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            .input-panel {
                flex: 0 0 auto;
                max-height: 50vh;
            }
            .preview-panel {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>

    <!-- 頂部標題列 -->
    <div class="header">
        <h1>🏢 組織架構圖生成器</h1>
        <p>輸入節點資料，即時生成組織架構圖</p>
    </div>

    <!-- 主容器 -->
    <div class="main-container">

        <!-- ===== 左側：輸入面板 ===== -->
        <div class="input-panel">

            <div class="panel-header">
                <span class="icon">📝</span> 新增節點
            </div>

            <!-- 表單 -->
            <div class="form-section">
                <div class="form-group">
                    <label for="nodeName">
                        節點名稱 <span class="required">*</span>
                    </label>
                    <input
                        type="text"
                        id="nodeName"
                        placeholder="請輸入人員姓名或單位名稱"
                        maxlength="50"
                    >
                </div>

                <div class="form-group">
                    <label for="nodeParent">
                        父節點 <span class="optional">(選填，空著代表根節點)</span>
                    </label>
                    <select id="nodeParent">
                        <option value="">-- 無（設為根節點） --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nodeDuty">
                        節點職務內容 <span class="optional">(選填)</span>
                    </label>
                    <textarea
                        id="nodeDuty"
                        placeholder="請輸入職務描述（選填）"
                        maxlength="200"
                        rows="2"
                    ></textarea>
                </div>

                <button class="btn btn-primary" onclick="addNode()">
                    ➕ 新增節點
                </button>
            </div>

            <!-- 已新增的節點列表 -->
            <div class="node-list-section">
                <h3>📋 已新增的節點（<span id="nodeCount">0</span>）</h3>
                <div id="nodeList">
                    <div class="empty-state">
                        尚無節點，請在上方新增
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 右側：預覽面板 ===== -->
        <div class="preview-panel">
            <div class="panel-header">
                <span><span class="icon">📊</span> 組織架構圖預覽</span>
                <div class="preview-actions">
                    <button class="btn btn-outline btn-sm" onclick="exportPNG()">
                        📥 匯出 PNG
                    </button>
                    <button class="btn btn-outline btn-sm" onclick="resetAll()">
                        🗑️ 清除全部
                    </button>
                </div>
            </div>
            <div id="org-chart-container">
                <div id="org-chart"></div>
            </div>
        </div>
    </div>

    <!-- 提示訊息 -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== Google Charts 初始化 ====================
        google.charts.load('current', { packages: ['orgchart'] });
        google.charts.setOnLoadCallback(() => {
            console.log('Google Charts 載入完成');
            drawChart();
        });

        // ==================== 資料儲存 ====================
        // 使用扁平化結構 + parentId
        let nodes = [];

        // 從 localStorage 載入已儲存的資料
        function loadFromStorage() {
            const saved = localStorage.getItem('orgChartNodes');
            if (saved) {
                try {
                    nodes = JSON.parse(saved);
                    renderNodeList();
                    drawChart();
                } catch (e) {
                    console.error('資料載入失敗', e);
                    nodes = [];
                }
            }
        }

        // 儲存到 localStorage
        function saveToStorage() {
            localStorage.setItem('orgChartNodes', JSON.stringify(nodes));
        }

        // ==================== 節點操作 ====================
        // 生成唯一 ID
        function generateId() {
            return 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }

        // 新增節點
        function addNode() {
            const nameInput = document.getElementById('nodeName');
            const parentSelect = document.getElementById('nodeParent');
            const dutyInput = document.getElementById('nodeDuty');

            const name = nameInput.value.trim();
            const parentId = parentSelect.value || null;
            const duty = dutyInput.value.trim() || null;

            // 驗證：名稱必填
            if (!name) {
                showToast('請輸入節點名稱', 'error');
                nameInput.focus();
                return;
            }

            // 驗證：名稱不能重複
            if (nodes.some(n => n.name === name)) {
                showToast('節點名稱已存在，請使用不同名稱', 'error');
                return;
            }

            // 檢查是否會造成循環引用（簡單檢查：父節點不能是自己的子孫）
            if (parentId && wouldCreateCycle(parentId)) {
                showToast('無法設定此父節點，可能會造成循環引用', 'error');
                return;
            }

            // 新增節點
            const newNode = {
                id: generateId(),
                name: name,
                parentId: parentId,
                duty: duty
            };
            nodes.push(newNode);

            // 儲存並重新渲染
            saveToStorage();
            renderNodeList();
            updateParentSelect();
            drawChart();

            // 清空表單
            nameInput.value = '';
            parentSelect.value = '';
            dutyInput.value = '';
            nameInput.focus();

            showToast(`已新增節點：${name}`, 'success');
        }

        // 檢查是否會造成循環引用
        function wouldCreateCycle(parentId) {
            // 取得所有父節點 ID 的集合
            const visited = new Set();
            let currentId = parentId;

            while (currentId) {
                if (visited.has(currentId)) return true; // 已經出現過，有循環
                visited.add(currentId);
                const parent = nodes.find(n => n.id === currentId);
                if (!parent || !parent.parentId) break;
                currentId = parent.parentId;
            }
            return false;
        }

        // 編輯節點（此處示範簡單做法：刪除後重新填寫）
        function editNode(nodeId) {
            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;

            // 把資料填回表單
            document.getElementById('nodeName').value = node.name;
            document.getElementById('nodeParent').value = node.parentId || '';
            document.getElementById('nodeDuty').value = node.duty || '';

            // 刪除舊節點
            nodes = nodes.filter(n => n.id !== nodeId);
            // 將其他節點中以此節點為父的，改為 null
            nodes.forEach(n => {
                if (n.parentId === nodeId) {
                    n.parentId = null;
                }
            });

            saveToStorage();
            renderNodeList();
            updateParentSelect();
            drawChart();

            showToast(`正在編輯：${node.name}，修改後請按新增`, 'success');
        }

        // 刪除節點
        function deleteNode(nodeId) {
            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;

            if (!confirm(`確定要刪除節點「${node.name}」嗎？\n其子節點將變為根節點。`)) {
                return;
            }

            // 將子節點的 parentId 設為 null
            nodes.forEach(n => {
                if (n.parentId === nodeId) {
                    n.parentId = null;
                }
            });

            // 刪除節點
            nodes = nodes.filter(n => n.id !== nodeId);

            saveToStorage();
            renderNodeList();
            updateParentSelect();
            drawChart();

            showToast(`已刪除節點：${node.name}`, 'success');
        }

        // 清除全部
        function resetAll() {
            if (nodes.length === 0) return;
            if (!confirm('確定要清除所有節點嗎？此操作無法復原。')) return;

            nodes = [];
            saveToStorage();
            renderNodeList();
            updateParentSelect();
            drawChart();
            showToast('已清除所有節點', 'success');
        }

        // ==================== 渲染節點列表 ====================
        function renderNodeList() {
            const listContainer = document.getElementById('nodeList');
            const countSpan = document.getElementById('nodeCount');

            countSpan.textContent = nodes.length;

            if (nodes.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">尚無節點，請在上方新增</div>';
                return;
            }

            let html = '';
            nodes.forEach(node => {
                const parentName = node.parentId
                    ? (nodes.find(n => n.id === node.parentId)?.name || '未知')
                    : '無（根節點）';

                html += `
                    <div class="node-item">
                        <div class="node-info">
                            <div class="node-name">${escapeHtml(node.name)}</div>
                            <div class="node-detail">
                                上級：${escapeHtml(parentName)}
                                ${node.duty ? `｜職務：${escapeHtml(node.duty)}` : ''}
                            </div>
                        </div>
                        <div class="node-actions">
                            <button class="btn btn-outline btn-sm" onclick="editNode('${node.id}')" title="編輯">
                                ✏️
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteNode('${node.id}')" title="刪除">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
            });

            listContainer.innerHTML = html;
        }

        // ==================== 更新父節點下拉選單 ====================
        function updateParentSelect() {
            const select = document.getElementById('nodeParent');
            const currentValue = select.value;

            let options = '<option value="">-- 無（設為根節點） --</option>';
            nodes.forEach(node => {
                const selected = node.id === currentValue ? 'selected' : '';
                options += `<option value="${node.id}" ${selected}>${escapeHtml(node.name)}</option>`;
            });
            select.innerHTML = options;
        }

        // ==================== 繪製組織架構圖 ====================
        function drawChart() {
            const container = document.getElementById('org-chart');

            if (nodes.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; color:#bbb; padding:60px;">
                        <div style="font-size:3rem;">🏗️</div>
                        <p style="margin-top:16px;">請在左側新增節點來生成組織架構圖</p>
                    </div>
                `;
                return;
            }

            // 建立 Google OrgChart 需要的 DataTable
            const data = new google.visualization.DataTable();
            data.addColumn('string', 'Name');
            data.addColumn('string', 'Manager');
            data.addColumn('string', 'ToolTip');

            nodes.forEach(node => {
                const parentName = node.parentId
                    ? (nodes.find(n => n.id === node.parentId)?.name || '')
                    : '';

                // Tooltip 顯示職務內容
                const tooltip = node.duty
                    ? `${node.name}\n職務：${node.duty}`
                    : node.name;

                data.addRow([
                    { v: node.name, f: formatNodeLabel(node) },
                    parentName,
                    tooltip
                ]);
            });

            const chart = new google.visualization.OrgChart(container);
            chart.draw(data, {
                allowHtml: true,
                size: 'large',
                nodeClass: 'org-node',
                selectedNodeClass: 'org-node-selected',
            });
        }

        // 格式化節點標籤（顯示名稱 + 職務）
        function formatNodeLabel(node) {
            let html = `<div class="org-node-card">`;
            html += `<div class="org-node-name">${escapeHtml(node.name)}</div>`;
            if (node.duty) {
                html += `<div class="org-node-duty">${escapeHtml(node.duty)}</div>`;
            }
            html += `</div>`;
            return html;
        }

        // ==================== 匯出 PNG ====================
        function exportPNG() {
            if (nodes.length === 0) {
                showToast('請先新增節點', 'error');
                return;
            }

            // 使用 html2canvas 或簡單做法：提示使用者截圖
            // 這裡用一個簡單的 SVG 匯出替代方案
            const container = document.getElementById('org-chart');
            const svgElements = container.getElementsByTagName('svg');

            if (svgElements.length > 0) {
                const svgData = new XMLSerializer().serializeToString(svgElements[0]);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(svgBlob);

                img.onload = function () {
                    canvas.width = img.width * 2;
                    canvas.height = img.height * 2;
                    ctx.scale(2, 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url);

                    const pngUrl = canvas.toDataURL('image/png');
                    const downloadLink = document.createElement('a');
                    downloadLink.href = pngUrl;
                    downloadLink.download = '組織架構圖.png';
                    downloadLink.click();
                    showToast('匯出成功！', 'success');
                };

                img.src = url;
            } else {
                showToast('無法匯出，請確認圖表已正確渲染', 'error');
            }
        }

        // ==================== 輔助函式 ====================
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ==================== 鍵盤快捷鍵 ====================
        document.addEventListener('keydown', function (e) {
            // Ctrl + Enter 新增節點
            if (e.ctrlKey && e.key === 'Enter') {
                addNode();
            }
        });

        // ==================== 初始化 ====================
        function init() {
            loadFromStorage();
            updateParentSelect();
            renderNodeList();

            // 如果 Google Charts 已經載入，繪製圖表
            if (window.google && google.visualization) {
                drawChart();
            }
        }

        // 頁面載入完成後初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
