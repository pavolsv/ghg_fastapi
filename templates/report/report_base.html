<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>{{ company.company_name | default("公司名稱") }} {{ report.inventory_year }} 年溫室氣體盤查報告書</title>
  <style>
    @page {
      size: A4;
      margin: 2cm;
    }
    body {
      font-family: "DFKai-SB", "BiauKai", "標楷體", "KaiTi", serif;
      font-size: 12pt;
      line-height: 1.8;
      color: #333;
    }
    h1 {
      font-size: 20pt;
      text-align: center;
      margin-bottom: 0.5em;
    }
    h2 {
      font-size: 16pt;
      border-bottom: 2px solid #333;
      padding-bottom: 0.2em;
      margin-top: 1.5em;
    }
    h3 {
      font-size: 14pt;
      margin-top: 1.2em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 11pt;
    }
    th, td {
      border: 1px solid #666;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    .page-break {
      page-break-before: always;
    }
    .cover {
      text-align: center;
      padding-top: 8cm;
    }
    .cover h1 {
      font-size: 24pt;
    }
    .note {
      font-size: 10pt;
      color: #666;
    }
    .report-chapter {
      margin-bottom: 2em;
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
