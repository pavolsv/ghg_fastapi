<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溫室氣體盤查系統 - 註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background: #f4f7f5; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 1); 
            border: 1px solid #e2e8f0; 
        }
        .spinner { border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; width: 1.2rem; height: 1.2rem; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-600 rounded-2xl shadow-sm mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">建立盤查帳戶</h1>
            <p class="text-slate-500 text-sm mt-1">GHG Inventory Management System</p>
        </div>

        <div class="glass-card shadow-xl rounded-3xl p-8 md:p-10">
            <h2 class="text-lg font-semibold text-slate-700 mb-6 border-b pb-4">新使用者註冊</h2>

            {% if message %}
            <div class="mb-6 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-r-lg">
                <div class="flex items-center">
                    <svg class="h-4 w-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                    {{ message }}
                </div>
            </div>
            {% endif %}
            
            <form action="/register/" method="POST" class="space-y-5" onsubmit="showLoading()">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-600 mb-1.5">電子信箱</label>
                    <input type="email" id="email" name="email" required 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                        placeholder="請設定電子郵件">
                </div>

                <div>
                    <label for="username" class="block text-sm font-medium text-slate-600 mb-1.5">帳號名稱</label>
                    <input type="text" id="username" name="username" required 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                        placeholder="請設定登入帳號">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-600 mb-1.5">密碼</label>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                        placeholder="請設定密碼">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full mt-2 py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-xl shadow-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span id="btnText">立即註冊</span>
                    <div id="btnSpinner" class="spinner"></div>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500">
                    已經有帳號了？ <a href="/login/" class="text-emerald-700 font-medium hover:underline">返回登入</a>
                </p>
            </div>
        </div>


    </div>

    <script>
        function showLoading() {
            const btn = document.getElementById('submitBtn');
            const text = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            text.innerText = '正在處理註冊...';
            spinner.style.display = 'block';
        }
    </script>
</body>
</html>
